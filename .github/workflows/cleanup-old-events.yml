name: Monthly Cleanup - Delete Old Events

on:
  schedule:
    # 毎月1日 3:00 JST に実行
    # GitHub Actions は UTC のため、1日 18:00 UTC (= 2日 3:00 JST) で近似
    - cron: '0 18 1 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry_run: true にすると削除せず対象件数の確認のみ行う'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Count deletion targets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== 削除対象の確認 ==="
          echo "対象イベント:"
          pnpm exec wrangler d1 execute guided-scheduler --remote --command "SELECT e.id, e.name, MAX(dates.value) AS max_candidate_date FROM events e, json_each(e.candidate_dates) AS dates GROUP BY e.id HAVING MAX(dates.value) < date('now', '-30 days')"
          echo "対象参加者数:"
          pnpm exec wrangler d1 execute guided-scheduler --remote --command "SELECT COUNT(*) AS target_participants FROM participants WHERE event_id IN (SELECT e.id FROM events e, json_each(e.candidate_dates) AS dates GROUP BY e.id HAVING MAX(dates.value) < date('now', '-30 days'))"

      - name: Delete old participants
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== 古い参加者データを削除 ==="
          pnpm exec wrangler d1 execute guided-scheduler --remote --command "DELETE FROM participants WHERE event_id IN (SELECT e.id FROM events e, json_each(e.candidate_dates) AS dates GROUP BY e.id HAVING MAX(dates.value) < date('now', '-30 days'))"

      - name: Delete old events
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== 古いイベントを削除 ==="
          pnpm exec wrangler d1 execute guided-scheduler --remote --command "DELETE FROM events WHERE id IN (SELECT e.id FROM events e, json_each(e.candidate_dates) AS dates GROUP BY e.id HAVING MAX(dates.value) < date('now', '-30 days'))"

      - name: Log completion
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "=== ドライラン完了 (削除は実行されていません) ==="
          else
            echo "=== クリーンアップ完了 ==="
            echo "候補日の最大日から30日以上経過したイベントを削除しました。"
          fi
